name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync version to release tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          node -e "
            const fs = require('fs');
            const tag = process.env.RELEASE_TAG;

            const manifest = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
            const minAppVersion = manifest.minAppVersion;
            manifest.version = tag;
            fs.writeFileSync('manifest.json', JSON.stringify(manifest, null, '\t') + '\n');

            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = tag;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, '\t') + '\n');

            const versions = JSON.parse(fs.readFileSync('versions.json', 'utf8'));
            versions[tag] = minAppVersion;
            fs.writeFileSync('versions.json', JSON.stringify(versions, null, '\t') + '\n');

            console.log('Synced version to', tag);
          "

      - name: Build
        run: npm run build

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$RELEASE_TAG" main.js manifest.json styles.css sql-wasm.wasm --clobber
